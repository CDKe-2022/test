<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三国字兵：合成塔防</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #1a252f; color: #ecf0f1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
    
    /* 顶部状态栏 */
    #top-bar { background: #2c3e50; padding: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; flex-wrap: wrap; border-bottom: 1px solid #34495e; }
    .stat-box { background: #1a252f; padding: 4px 8px; border-radius: 4px; margin: 2px; }
    .stat-box span { color: #f39c12; font-weight: bold; }
    #info-ticker { width: 100%; background: #111; color: #aaa; padding: 4px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid #333; border-bottom: 1px solid #333; }
    
    /* 战场地图 */
    #map-container { flex-grow: 1; position: relative; background: #2c3e50; overflow: hidden; }
    .grid-cell { position: absolute; width: 14%; height: 14%; border: 1px dashed #4a6278; border-radius: 4px; transform: translate(-50%, -50%); z-index: 1; }
    .path-cell { background: #7f8c8d; border: none; z-index: 0; width: 100%; height: 100%; }
    
    /* 单位样式 */
    .unit { position: absolute; width: 14%; height: 14%; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; transform: translate(-50%, -50%); z-index: 10; transition: transform 0.1s; font-size: 14px; }
    .unit-enemy { color: #e74c3c; background: rgba(231, 76, 60, 0.2); border: 1px solid #c0392b; }
    .unit-basic { color: #3498db; background: rgba(52, 152, 219, 0.2); border: 1px solid #2980b9; }
    .unit-surname { color: #9b59b6; background: rgba(155, 89, 182, 0.2); border: 1px solid #8e44ad; }
    .unit-name { color: #1abc9c; background: rgba(26, 188, 156, 0.2); border: 1px solid #16a085; }
    .unit-hero { color: #f1c40f; background: rgba(241, 196, 15, 0.3); border: 2px solid #f39c12; box-shadow: 0 0 5px #f39c12; }
    .unit-shovel { color: #95a5a6; background: rgba(149, 165, 166, 0.2); border: 1px solid #7f8c8d; }
    
    .selected { box-shadow: 0 0 0 3px #f1c40f; z-index: 20; transform: translate(-50%, -50%) scale(1.1); }
    
    /* 血条 */
    .hp-bar { position: absolute; top: 2px; left: 15%; width: 70%; height: 3px; background: #c0392b; border-radius: 2px; }
    .hp-fill { height: 100%; background: #2ecc71; border-radius: 2px; }

    /* 底部招募区 */
    #bottom-bar { background: #2c3e50; padding: 8px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #34495e; }
    #recruit-area { display: flex; gap: 6px; justify-content: space-between; }
    .slot { flex: 1; aspect-ratio: 1; background: #1a252f; border: 2px dashed #4a6278; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; position: relative; }
    .slot.empty { border-color: #2c3e50; }
    
    #action-area { display: flex; gap: 10px; }
    #recruit-btn { flex: 3; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    #recruit-btn:active { background: #d35400; }
    #recruit-btn:disabled { background: #95a5a6; }
    #open-map-btn { flex: 1; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; }
    #open-map-btn:active { background: #2ecc71; }
    #open-map-btn:disabled { background: #95a5a6; }
    
    /* 游戏结束遮罩 */
    #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    #game-over h1 { color: #e74c3c; font-size: 32px; margin-bottom: 10px; }
    #game-over p { color: #ecf0f1; margin-bottom: 20px; }
    #restart-btn { padding: 10px 20px; background: #e67e22; color: white; border: none; border-radius: 4px; font-size: 16px; }
</style>
</head>
<body>

<!-- 顶部状态栏 -->
<div id="top-bar">
    <div style="display:flex; flex-wrap:wrap; width:100%;">
        <div class="stat-box">血量: <span id="castle-hp">100</span></div>
        <div class="stat-box">金币: <span id="gold">50</span></div>
        <div class="stat-box">地图: <span id="map-level">黄巾</span></div>
        <div class="stat-box">铲: <span id="shovel-count">0</span>/3</div>
    </div>
    <div id="info-ticker">点击招募获取文字。选中文字后点击地图空地部署。</div>
</div>

<!-- 战场 -->
<div id="map-container">
    <div id="game-over">
        <h1>城破国亡！</h1>
        <p id="survival-time"></p>
        <button id="restart-btn">重新开始</button>
    </div>
</div>

<!-- 底部招募区 -->
<div id="bottom-bar">
    <div id="recruit-area">
        <div class="slot empty" data-index="0"></div>
        <div class="slot empty" data-index="1"></div>
        <div class="slot empty" data-index="2"></div>
        <div class="slot empty" data-index="3"></div>
        <div class="slot empty" data-index="4"></div>
        <div class="slot empty" data-index="5"></div>
    </div>
    <div id="action-area">
        <button id="recruit-btn">招募 (20金)</button>
        <button id="open-map-btn" disabled>开图</button>
    </div>
</div>

<script>
// --- 游戏配置数据 ---
const TYPES = {
    BASIC: ['弓', '刀', '枪', '骑'],
    SURNAME: ['关', '张', '赵', '马', '黄', '吕', '诸'],
    NAME: ['羽', '飞', '云', '超', '忠', '布', '亮'],
    SHOVEL: ['铲']
};

const UPGRADE_TREE = {
    '弓': '弩', '弩': '射', '射': '神射',
    '刀': '剑', '剑': '斩', '斩': '绝斩',
    '枪': '矛', '矛': '刺', '刺': '贯',
    '骑': '驱', '驱': '驰', '驰': '铁骑'
};

const HERO_DB = {
    '关羽': { skill: '横扫', dmg: 50, range: 35, atkSpeed: 1200 },
    '张飞': { skill: '震击', dmg: 40, range: 25, atkSpeed: 1000 },
    '赵云': { skill: '连击', dmg: 30, range: 30, atkSpeed: 400 },
    '吕布': { skill: '无双', dmg: 80, range: 30, atkSpeed: 800 },
    '诸葛亮':{ skill: '八阵', dmg: 10, range: 50, atkSpeed: 1500 }
};

const UNIT_STATS = {
    '弓': {dmg:10, range:30, atkSpeed:1000}, '弩': {dmg:25, range:32, atkSpeed:900}, '射': {dmg:60, range:35, atkSpeed:800}, '神射': {dmg:150, range:40, atkSpeed:700},
    '刀': {dmg:15, range:15, atkSpeed:800}, '剑': {dmg:35, range:16, atkSpeed:750}, '斩': {dmg:80, range:18, atkSpeed:700}, '绝斩': {dmg:180, range:20, atkSpeed:600},
    '枪': {dmg:12, range:20, atkSpeed:1200}, '矛': {dmg:30, range:22, atkSpeed:1100}, '刺': {dmg:70, range:24, atkSpeed:1000}, '贯': {dmg:160, range:26, atkSpeed:900},
    '骑': {dmg:20, range:15, atkSpeed:600}, '驱': {dmg:45, range:16, atkSpeed:500}, '驰': {dmg:90, range:18, atkSpeed:400}, '铁骑': {dmg:200, range:20, atkSpeed:300}
};

// --- 地图配置 (百分比坐标 0-100) ---
const MAPS = [
    { name: "黄巾", path: [{x: 0, y: 30}, {x: 70, y: 30}, {x: 70, y: 70}, {x: 0, y: 70}] },
    { name: "虎牢", path: [{x: 0, y: 20}, {x: 40, y: 20}, {x: 40, y: 80}, {x: 100, y: 80}] }
];

// --- 游戏状态 ---
let state = {
    gold: 50, castleHp: 100, mapLevel: 1, shovels: 0,
    units: [], enemies: [], enemyIdCounter: 0, unitIdCounter: 0,
    isGameOver: false, startTime: Date.now()
};

let selectedEntity = null; // { type: 'slot'|'map', el: HTMLElement, data: object }

// --- DOM 元素 ---
const mapContainer = document.getElementById('map-container');
const recruitArea = document.getElementById('recruit-area');
const goldEl = document.getElementById('gold');
const hpEl = document.getElementById('castle-hp');
const shovelEl = document.getElementById('shovel-count');
const tickerEl = document.getElementById('info-ticker');
const gameoverDiv = document.getElementById('game-over');

// --- 绘制地图 ---
function drawMap() {
    // 清空旧地图元素，保留gameover
    Array.from(mapContainer.children).forEach(child => {
        if (child.id !== 'game-over') child.remove();
    });

    const mapData = MAPS[(state.mapLevel - 1) % MAPS.length];
    const pathPoints = mapData.path;
    
    // 1. 画路径线
    pathPoints.forEach((p, i) => {
        if (i < pathPoints.length - 1) {
            const p2 = pathPoints[i+1];
            if (p.x === p2.x) {
                const line = document.createElement('div');
                line.className = 'path-cell';
                line.style.position = 'absolute';
                line.style.left = p.x + '%';
                line.style.top = Math.min(p.y, p2.y) + '%';
                line.style.width = '10px';
                line.style.height = Math.abs(p2.y - p.y) + '%';
                line.style.transform = 'translateX(-50%)';
                mapContainer.appendChild(line);
            } else {
                const line = document.createElement('div');
                line.className = 'path-cell';
                line.style.position = 'absolute';
                line.style.top = p.y + '%';
                line.style.left = Math.min(p.x, p2.x) + '%';
                line.style.height = '10px';
                line.style.width = Math.abs(p2.x - p.x) + '%';
                line.style.transform = 'translateY(-50%)';
                mapContainer.appendChild(line);
            }
        }
    });

    // 2. 生成可建筑点
    for(let y=15; y<=85; y+=14) {
        for(let x=10; x<=90; x+=14) {
            let isPath = false;
            for(let i=0; i<pathPoints.length-1; i++) {
                const p1 = pathPoints[i], p2 = pathPoints[i+1];
                if (p1.y === p2.y && Math.abs(y - p1.y) < 10 && x >= Math.min(p1.x,p2.x)-5 && x <= Math.max(p1.x,p2.x)+5) isPath = true;
                if (p1.x === p2.x && Math.abs(x - p1.x) < 10 && y >= Math.min(p1.y,p2.y)-5 && y <= Math.max(p1.y,p2.y)+5) isPath = true;
            }
            if (!isPath) {
                const div = document.createElement('div');
                div.className = 'grid-cell';
                div.style.left = x + '%';
                div.style.top = y + '%';
                div.dataset.x = x;
                div.dataset.y = y;
                div.addEventListener('click', (e) => handleMapClick(e, x, y));
                mapContainer.appendChild(div);
            }
        }
    }

    // 3. 画终点主城
    const endP = pathPoints[pathPoints.length-1];
    const endDiv = document.createElement('div');
    endDiv.style.position = 'absolute';
    endDiv.style.left = endP.x + '%';
    endDiv.style.top = endP.y + '%';
    endDiv.style.width = '14%';
    endDiv.style.height = '14%';
    endDiv.style.background = '#c0392b';
    endDiv.style.display = 'flex';
    endDiv.style.alignItems = 'center';
    endDiv.style.justifyContent = 'center';
    endDiv.style.borderRadius = '4px';
    endDiv.style.transform = 'translate(-50%, -50%)';
    endDiv.style.zIndex = '5';
    endDiv.style.fontWeight = 'bold';
    endDiv.innerText = '城';
    mapContainer.appendChild(endDiv);
}

// --- 招募系统 ---
function recruit() {
    if (state.gold < 20) return log("金币不足！");
    state.gold -= 20;
    updateUI();
    
    document.querySelectorAll('.slot').forEach(s => {
        s.innerHTML = '';
        s.classList.add('empty');
        s.onclick = null; // 移除点击事件
    });

    for (let i = 0; i < 6; i++) {
        const rand = Math.random();
        let char, type;
        if (rand < 0.60) { char = TYPES.BASIC[Math.floor(Math.random() * 4)]; type = 'basic'; }
        else if (rand < 0.80) { char = TYPES.SURNAME[Math.floor(Math.random() * 7)]; type = 'surname'; }
        else if (rand < 0.95) { char = TYPES.NAME[Math.floor(Math.random() * 7)]; type = 'name'; }
        else { char = '铲'; type = 'shovel'; }
        
        const slot = document.querySelector(`.slot[data-index="${i}"]`);
        slot.classList.remove('empty');
        
        const el = document.createElement('div');
        el.className = `unit unit-${type}`;
        el.style.position = 'relative';
        el.style.transform = 'none';
        el.style.width = '100%';
        el.style.height = '100%';
        el.innerText = char;
        
        if (char === '铲') {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                state.shovels++;
                slot.innerHTML = '';
                slot.classList.add('empty');
                log("获得一把铲子！");
                updateUI();
            });
        } else {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                selectEntity('slot', el, { char, type, index: i });
            });
        }
        slot.appendChild(el);
    }
}

// --- 选中与交互逻辑 ---
function selectEntity(srcType, el, data) {
    if (selectedEntity && selectedEntity.el === el) {
        // 二次点击取消
        deselectEntity();
        return;
    }
    
    deselectEntity();
    selectedEntity = { srcType, el, data };
    el.classList.add('selected');
}

function deselectEntity() {
    if (selectedEntity && selectedEntity.el) {
        selectedEntity.el.classList.remove('selected');
    }
    selectedEntity = null;
}

function handleMapClick(e, x, y) {
    if (!selectedEntity) return;
    
    const target = e.target;
    // 如果点击的是地图上的单位
    if (target.classList.contains('unit') && !target.classList.contains('unit-enemy') && selectedEntity.srcType === 'map') {
        tryCombine(selectedEntity, target);
    } 
    // 如果选中的是候选区的字，且点击的是空地
    else if (selectedEntity.srcType === 'slot' && target.classList.contains('grid-cell')) {
        deployUnit(selectedEntity.data.char, selectedEntity.data.type, x, y);
        
        // 消耗候选区的字
        const slot = document.querySelector(`.slot[data-index="${selectedEntity.data.index}"]`);
        slot.innerHTML = '';
        slot.classList.add('empty');
        deselectEntity();
    }
    // 点击空白处取消选中
    else if (target.classList.contains('grid-cell') || target.id === 'map-container') {
        deselectEntity();
    }
}

// 监听地图内单位的点击，用于合成
mapContainer.addEventListener('click', (e) => {
    if (state.isGameOver) return;
    const target = e.target;
    
    // 点击地图上的我方单位
    if (target.classList.contains('unit') && !target.classList.contains('unit-enemy')) {
        if (selectedEntity && selectedEntity.srcType === 'map') {
            tryCombine(selectedEntity, target);
        } else {
            const id = target.dataset.id;
            const unit = state.units.find(u => u.id == id);
            if (unit) selectEntity('map', target, unit);
        }
    } else if (target.classList.contains('grid-cell') && selectedEntity && selectedEntity.srcType === 'map') {
        // 地图上的字不允许移动，点击空地取消选中
        deselectEntity();
    }
});

function tryCombine(u1Entity, u2El) {
    const u1 = u1Entity.data;
    const u2 = state.units.find(u => u.id == u2El.dataset.id);
    if (!u2) return;

    const char1 = u1.char, char2 = u2.char;
    const combinedStr = char1 + char2;

    if (HERO_DB[combinedStr] || HERO_DB[char2 + char1]) {
        const heroName = HERO_DB[combinedStr] ? combinedStr : char2 + char1;
        log(`✨ ${heroName} 降临！`, true);
        removeUnit(u1);
        removeUnit(u2);
        deployUnit(heroName, 'hero', u2.x, u2.y);
        deselectEntity();
        return;
    }

    if (char1 === char2 && UPGRADE_TREE[char1]) {
        const newChar = UPGRADE_TREE[char1];
        log(`${char1} 升级为 ${newChar}！`);
        removeUnit(u1);
        removeUnit(u2);
        deployUnit(newChar, 'basic', u2.x, u2.y);
        deselectEntity();
        return;
    }

    log("无法组成武将或升阶，字已退还！");
    // 视觉抖动效果
    u1Entity.el.style.animation = 'shake 0.3s';
    u2El.style.animation = 'shake 0.3s';
    setTimeout(() => {
        u1Entity.el.style.animation = '';
        u2El.style.animation = '';
    }, 300);
    deselectEntity();
}

function deployUnit(char, type, x, y) {
    const id = ++state.unitIdCounter;
    let stats;
    if (type === 'hero') {
        stats = HERO_DB[char];
    } else if (UPGRADE_TREE[char] || UNIT_STATS[char]) {
        stats = UNIT_STATS[char];
    } else {
        stats = { dmg: 0, range: 0, atkSpeed: 999999 }; // 无攻击力的姓/名
    }
    
    const unit = { id, char, type, x, y, ...stats, lastAtk: 0, el: null };
    
    const el = document.createElement('div');
    el.className = `unit unit-${type === 'hero' ? 'hero' : type}`;
    el.innerText = char;
    el.style.left = x + '%';
    el.style.top = y + '%';
    el.dataset.id = id;
    
    mapContainer.appendChild(el);
    unit.el = el;
    state.units.push(unit);
}

function removeUnit(u) {
    if (u.el) u.el.remove();
    state.units = state.units.filter(unit => unit.id !== u.id);
}

// --- 敌人与战斗系统 ---
function spawnEnemy() {
    if (state.isGameOver) return;
    const mapData = MAPS[(state.mapLevel - 1) % MAPS.length];
    const startP = mapData.path[0];
    
    const isZhu = Math.random() < 0.2;
    const hp = (isZhu ? 100 : 50) * (1 + (state.mapLevel-1)*0.5); // 难度递增
    const speed = isZhu ? 0.3 : 0.6;
    const char = isZhu ? '卒' : '兵';
    
    const enemy = {
        id: ++state.enemyIdCounter, char, x: startP.x, y: startP.y,
        hp, maxHp: hp, speed, pathIndex: 0, el: null
    };
    
    const el = document.createElement('div');
    el.className = 'unit unit-enemy';
    el.innerText = char;
    el.style.left = enemy.x + '%';
    el.style.top = enemy.y + '%';
    
    const hpBar = document.createElement('div');
    hpBar.className = 'hp-bar';
    const hpFill = document.createElement('div');
    hpFill.className = 'hp-fill';
    hpFill.style.width = '100%';
    hpBar.appendChild(hpFill);
    el.appendChild(hpBar);
    
    mapContainer.appendChild(el);
    enemy.el = el;
    enemy.hpFillEl = hpFill;
    
    state.enemies.push(enemy);
}

function updateGame() {
    if (state.isGameOver) return;

    const mapData = MAPS[(state.mapLevel - 1) % MAPS.length];
    
    // 1. 敌人移动
    for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (e.pathIndex < mapData.path.length - 1) {
            const targetP = mapData.path[e.pathIndex + 1];
            const dx = targetP.x - e.x;
            const dy = targetP.y - e.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < e.speed * 2) {
                e.pathIndex++;
            } else {
                e.x += (dx / dist) * e.speed;
                e.y += (dy / dist) * e.speed;
            }
            e.el.style.left = e.x + '%';
            e.el.style.top = e.y + '%';
        } else {
            state.castleHp -= 10;
            removeEnemy(e);
            if (state.castleHp <= 0) gameOver();
        }
    }

    // 2. 我方攻击
    const now = Date.now();
    state.units.forEach(u => {
        if (u.dmg === 0) return;
        
        let target = null;
        let minDist = u.range;
        state.enemies.forEach(e => {
            const dx = e.x - u.x;
            const dy = e.y - u.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < minDist) {
                minDist = dist;
                target = e;
            }
        });
        
        if (target && now - u.lastAtk > u.atkSpeed) {
            u.lastAtk = now;
            u.el.style.transform = 'translate(-50%, -50%) scale(1.3)';
            setTimeout(() => { if(u.el) u.el.style.transform = 'translate(-50%, -50%) scale(1)'; }, 100);
            
            target.hp -= u.dmg;
            target.hpFillEl.style.width = (target.hp / target.maxHp * 100) + '%';
            
            if (target.hp <= 0) {
                state.gold += target.char === '卒' ? 15 : 10;
                removeEnemy(target);
                updateUI();
            }
        }
    });
}

function removeEnemy(e) {
    if (e.el) e.el.remove();
    state.enemies = state.enemies.filter(en => en.id !== e.id);
}

function gameOver() {
    state.isGameOver = true;
    const time = Math.floor((Date.now() - state.startTime) / 1000);
    document.getElementById('survival-time').innerText = `坚持了 ${time} 秒`;
    gameoverDiv.style.display = 'flex';
}

// --- UI 更新 ---
function updateUI() {
    goldEl.innerText = state.gold;
    hpEl.innerText = Math.max(0, state.castleHp);
    shovelEl.innerText = state.shovels;
    document.getElementById('map-level').innerText = MAPS[(state.mapLevel - 1) % MAPS.length].name;
    
    const openBtn = document.getElementById('open-map-btn');
    if (state.shovels >= 3) {
        openBtn.disabled = false;
    } else {
        openBtn.disabled = true;
    }
}

function log(msg, isHero = false) {
    tickerEl.innerText = msg;
    tickerEl.style.color = isHero ? '#f1c40f' : '#aaa';
}

// --- 开图逻辑 ---
document.getElementById('open-map-btn').addEventListener('click', () => {
    if (state.shovels < 3) return;
    state.shovels = 0;
    state.mapLevel++;
    state.castleHp = 100;
    state.enemies.forEach(e => e.el.remove());
    state.enemies = [];
    state.units.forEach(u => u.el.remove());
    state.units = [];
    
    log(`开辟新图：${MAPS[(state.mapLevel - 1) % MAPS.length].name}！`);
    drawMap();
    updateUI();
});

document.getElementById('recruit-btn').addEventListener('click', recruit);
document.getElementById('restart-btn').addEventListener('click', () => {
    location.reload();
});

// 加入抖动动画
const style = document.createElement('style');
style.innerHTML = `@keyframes shake { 0% { transform: translate(-50%, -50%) translateX(0); } 25% { transform: translate(-50%, -50%) translateX(-5px); } 75% { transform: translate(-50%, -50%) translateX(5px); } 100% { transform: translate(-50%, -50%) translateX(0); } }`;
document.head.appendChild(style);

// 初始化
drawMap();
updateUI();
setInterval(updateGame, 16);
setInterval(spawnEnemy, 2500);
</script>
